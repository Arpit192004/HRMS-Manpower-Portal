services:
  - type: web
    name: hrms-manpower-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://hrms-manpower-portal.vercel.app
